{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - FunkoMarket</title>
<link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
<header class="header">
  <div class="container header-inner">
    <h1 class="logo"> Admin <span>Panel</span></h1>
    <nav class="nav">
      <a href="{% url 'inicio' %}" class="btn-admin">Volver a la tienda</a>
      <button id="themeToggle" class="theme-toggle" title="Cambiar tema">🌙</button>
    </nav>
  </div>
</header>

<main class="container admin-main">
  <section class="form-card">
    <h2 id="formTitle">Cargar nuevo producto</h2>
    <form id="productForm" method="post">
      <img src="{% static 'src/funko_donatello.jpg' %}" alt="">
      {{form}}
    
       <button type="submit" class="btn-primary" id="submitBtn">Guardar producto</button>
        <p class="mensaje">{{Mensaje}}<p></p>
      <input type="hidden" id="productId">
      <div class="form-row">  
        <button type="button" class="btn-secondary" id="cancelBtn" hidden>Cancelar edición</button>
      </div>
    </form>
  </section>

  <section class="admin-list">
    <h2>Productos cargados</h2>
    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr><th></th><th>Nombre</th><th>Empresa</th><th>Personaje</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
        </thead>
        <tbody id="adminTbody"></tbody>
      </table>
    </div>
  </section>
</main>

<script src="{% static 'js/data.js' %}"></script>
<script src="admin.js"></script>
</body>
</html>
